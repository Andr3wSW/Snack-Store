<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Home | Snack Store</title>

  <!-- ✅ Favicon goes HERE -->
  <link rel="icon" type="image/png" href="logo.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Snack Store</h1>

  <div id="customModal" class="modal">
    <div class="modal-content">
      <p id="modalMessage"></p>
      <button onclick="closeModal()">OK</button>
    </div>
  </div>

  <div id="userInfo"></div>
  <button onclick="window.location.href='https://lausdschoology.azurewebsites.net/?&domain=lms.lausd.net&timestamp=1774452356'">Panic Button</button>
  <div style="margin: 20px 0;">
  <input 
    type="text" 
    id="searchInput" 
    placeholder="Search snacks..."
    oninput="filterSnacks()"
    style="padding:8px;width:200px;"
  >

  <select id="stockFilter" onchange="filterSnacks()" style="padding:8px;">
    <option value="all">All</option>
    <option value="in">In Stock</option>
    <option value="out">Out of Stock</option>
  </select>
</div>
  <div id="snacks"></div>

  <p></p>
  
  <button onclick="window.location.href='cart.html'">Go to Cart</button>

  <script type="module" src="app.js"></script>

</body>
</html>
